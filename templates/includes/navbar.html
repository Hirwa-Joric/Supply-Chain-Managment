{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'core:home' %}">
            <i class="fas fa-boxes me-2"></i>
            SCM System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            {% if user.is_authenticated %}
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.view_name == 'inventory:dashboard' %}active{% endif %}"
                        href="{% url 'inventory:dashboard' %}">
                        <i class="fas fa-chart-line me-1"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'product' in request.resolver_match.view_name %}active{% endif %}"
                        href="{% url 'inventory:product_list' %}">
                        <i class="fas fa-box me-1"></i> Products
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="inventoryDropdown" role="button"
                        data-bs-toggle="dropdown">
                        <i class="fas fa-warehouse me-1"></i> Inventory
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a class="dropdown-item" href="{% url 'inventory:transaction_create' %}">
                                <i class="fas fa-exchange-alt me-1"></i> Record Transaction
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="{% url 'inventory:product_create' %}">
                                <i class="fas fa-plus me-1"></i> Add Product
                            </a>
                        </li>
                    </ul>
                </li>
                {% if user.is_staff %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'admin:index' %}">
                        <i class="fas fa-cog me-1"></i> Admin
                    </a>
                </li>
                {% endif %}
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                        data-bs-toggle="dropdown">
                        <i class="fas fa-user me-1"></i> {{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                                <i class="fas fa-user-circle me-1"></i> Profile
                            </a>
                        </li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <a class="dropdown-item" href="{% url 'accounts:logout' %}">
                                <i class="fas fa-sign-out-alt me-1"></i> Logout
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
            {% else %}
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'accounts:login' %}">
                        <i class="fas fa-sign-in-alt me-1"></i> Login
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'accounts:signup' %}">
                        <i class="fas fa-user-plus me-1"></i> Sign Up
                    </a>
                </li>
            </ul>
            {% endif %}
        </div>
    </div>
</nav>
